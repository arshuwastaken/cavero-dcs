<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavero DC's - Official</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #020617; /* Background color agar image na dikhe */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* BACKGROUND SECTION */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 'bg.png' aapke index.html ke saath honi chahiye */
            background: url('bg.png') no-repeat center center/cover;
            z-index: -3;
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Thoda halka overlay */
            z-index: -2;
        }

        #snowCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 100;
            top: 0; left: 0;
            background: rgba(2, 12, 27, 0.98);
            backdrop-filter: blur(15px);
            overflow-x: hidden;
            transition: 0.4s ease;
            border-right: 1px solid #3b82f6;
            padding-top: 80px;
        }

        .sidebar a {
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.2rem;
            color: white;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(59, 130, 246, 0.2);
            padding-left: 40px;
        }

        /* MENU BUTTON */
        .menu-btn {
            position: fixed;
            top: 25px; left: 25px;
            font-size: 30px;
            cursor: pointer;
            z-index: 50;
            color: white;
            text-shadow: 0 0 10px #3b82f6;
        }

        /* CONTENT */
        .main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: fadeIn 2s;
        }

        .logo {
            width: 150px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px #3b82f6);
        }

        .brand-title {
            font-size: 3.5rem;
            letter-spacing: 5px;
            font-weight: 900;
            margin-bottom: 30px;
        }

        .brand-title span { color: #3b82f6; }

        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
        }

        .action-btn {
            padding: 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #3b82f6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="overlay"></div>
    <canvas id="snowCanvas"></canvas>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" style="position:absolute; top:20px; right:25px; font-size:40px;" onclick="closeNav()">&times;</a>
        <a href="#">Dashboard</a>
        <a href="#">Services</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
    </div>

    <div class="menu-btn" onclick="openNav()">☰</div>

    <div class="main-content">
        <img src="logo.png" alt="Logo" class="logo">
        <h1 class="brand-title">CAVERO <span>DC'S</span></h1>
        
        <div class="btn-box">
            <a href="#" class="action-btn">CREATE SERVER</a>
            <a href="#" class="action-btn" style="background: rgba(255,255,255,0.1); border: 1px solid #3b82f6;">SUPPORT</a>
        </div>
    </div>

    <script>
        function openNav() { document.getElementById("sidebar").style.width = "280px"; }
        function closeNav() { document.getElementById("sidebar").style.width = "0"; }

        // Snow Logic
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let flakes = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            flakes = [];
            for(let i=0; i<100; i++) {
                flakes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, s: Math.random()*1+0.5 });
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            });
            ctx.fill();
            move();
        }

        function move() {
            flakes.forEach(f => {
                f.y += f.s;
                if(f.y > canvas.height) f.y = -5;
            });
        }

        window.addEventListener('resize', init);
        init();
        setInterval(draw, 30);

        // BG Check: Agar image load nahi hui to console mein error dikhayega
        const bgLayer = document.getElementById('bg-layer');
        const img = new Image();
        img.src = 'bg.png';
        img.onerror = function() {
            console.error("ALERT: 'bg.png' nahi mili! Check karo ki file folder mein hai ya nahi.");
            bgLayer.style.background = "radial-gradient(circle, #1e3a8a, #020617)"; 
        };
    </script>
</body>
</html>
