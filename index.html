<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavero DC's - Official</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #020617;
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* BACKGROUND SECTION */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.png') no-repeat center center/cover;
            z-index: -3;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.7);
            z-index: -2;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 100;
            top: 0; left: 0;
            background: #0f172a;
            overflow-x: hidden;
            transition: 0.3s ease;
            border-right: 1px solid #1e293b;
            padding-top: 80px;
        }

        .sidebar a {
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.3rem; /* Sidebar links bade kiye */
            color: #94a3b8;
            display: block;
            transition: 0.2s;
        }

        /* MENU BUTTON */
        .menu-btn {
            position: fixed;
            top: 30px; left: 30px;
            font-size: 35px; /* Menu icon bada kiya */
            cursor: pointer;
            z-index: 50;
            color: white;
            opacity: 0.8;
        }

        /* CONTENT - MAIN SIZE UPDATES */
        .main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 200px; /* Logo ka size bada kiya (120px se 200px) */
            margin-bottom: 30px;
        }

        .brand-title {
            font-size: 5rem; /* Text size kafi bada kiya */
            letter-spacing: 4px;
            font-weight: 900;
            margin-bottom: 50px;
            color: #f8fafc;
            line-height: 1;
        }

        .brand-title span { color: #3b82f6; }

        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 400px; /* Button container ki width badhai */
        }

        .action-btn {
            padding: 22px; /* Button ki height aur padding badhai */
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 18px; /* Button text bada kiya */
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .action-btn:hover {
            background: #1d4ed8;
            transform: scale(1.03); /* Hover par halka sa bada dikhega */
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #334155; /* Border thoda thick kiya */
            color: #f8fafc;
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .brand-title { font-size: 3rem; }
            .btn-box { width: 90%; }
            .logo { width: 150px; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="overlay"></div>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" style="position:absolute; top:20px; right:25px; font-size:40px;" onclick="closeNav()">&times;</a>
        <a href="#">Dashboard</a>
        <a href="#">Services</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
    </div>

    <div class="menu-btn" onclick="openNav()">☰</div>

    <div class="main-content">
        <img src="logo.png" alt="Logo" class="logo">
        <h1 class="brand-title">CAVERO <span>DC'S</span></h1>
        
        <div class="btn-box">
            <a href="#" class="action-btn">CREATE SERVER</a>
            <a href="#" class="action-btn btn-secondary">SUPPORT</a>
        </div>
    </div>

    <script>
        function openNav() { document.getElementById("sidebar").style.width = "300px"; }
        function closeNav() { document.getElementById("sidebar").style.width = "0"; }

        const bgLayer = document.getElementById('bg-layer');
        const img = new Image();
        img.src = 'bg.png';
        img.onerror = () => bgLayer.style.background = "#020617";
    </script>
</body>
</html>
