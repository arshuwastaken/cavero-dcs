<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavero DC's - Official</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #020617;
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* BACKGROUND SECTION */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.png') no-repeat center center/cover;
            z-index: -3;
        }

        /* FIXED SNOW CANVAS */
        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 100;
            top: 0;
            left: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            overflow-x: hidden;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 100px;
        }

        .sidebar a {
            padding: 20px 40px;
            text-decoration: none;
            font-size: 1.4rem;
            color: #94a3b8;
            display: block;
            transition: 0.3s;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .sidebar a:hover {
            color: white;
            background: rgba(59, 130, 246, 0.1);
            padding-left: 50px;
        }

        /* MENU BUTTON */
        .menu-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            font-size: 35px;
            cursor: pointer;
            z-index: 50;
            color: white;
            opacity: 0.8;
            transition: 0.3s;
        }

        .menu-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* CONTENT */
        .main-content {
            position: relative;
            z-index: 2;

            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .logo {
            width: 200px;
            margin-bottom: 30px;
        }

        .brand-title {
            font-size: 5rem;
            letter-spacing: 4px;
            font-weight: 900;
            margin-bottom: 50px;
            color: #f8fafc;
            line-height: 1;
        }

        .brand-title span {
            color: #3b82f6;
        }

        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 400px;
        }

        .action-btn {
            padding: 22px;
            border-radius: 12px;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .action-btn:hover {
            background: #1d4ed8;
            transform: scale(1.03);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #334155;
            color: #f8fafc;
        }

        @media (max-width: 600px) {
            .brand-title {
                font-size: 3rem;
            }

            .btn-box {
                width: 90%;
            }

            .logo {
                width: 150px;
            }
        }
    </style>
</head>

<body>

    <div id="bg-layer"></div>

    <canvas id="snowCanvas"></canvas>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)"
           style="position:absolute; top:25px; right:30px; font-size:45px;"
           onclick="closeNav()">
           &times;
        </a>

        <a href="#">Dashboard</a>
        <a href="#">Services</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
    </div>

    <div class="menu-btn" onclick="openNav()">☰</div>

    <div class="main-content">
        <img src="logo.png" alt="Logo" class="logo">

        <h1 class="brand-title">
            CAVERO <span>DC'S</span>
        </h1>

        <div class="btn-box">
            <a href="applydcserver.html" class="action-btn">
                CREATE SERVER
            </a>

            <a href="#" class="action-btn btn-secondary">
                SUPPORT
            </a>
        </div>
    </div>

    <script>
        function openNav() {
            document.getElementById("sidebar").style.width = "320px";
        }

        function closeNav() {
            document.getElementById("sidebar").style.width = "0";
        }

        // SNOW EFFECT
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        let flakes = [];

        function initSnow() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            flakes = [];

            for (let i = 0; i < 180; i++) {
                flakes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 3 + 1,
                    d: Math.random() * 1 + 0.5
                });
            }
        }

        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "rgba(255,255,255,0.9)";
            ctx.beginPath();

            for (let i = 0; i < flakes.length; i++) {
                let f = flakes[i];

                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
            }

            ctx.fill();

            moveSnow();
        }

        function moveSnow() {
            for (let i = 0; i < flakes.length; i++) {
                let f = flakes[i];

                f.y += f.d;
                f.x += Math.sin(f.y * 0.01);

                if (f.y > canvas.height) {
                    flakes[i] = {
                        x: Math.random() * canvas.width,
                        y: -10,
                        r: f.r,
                        d: f.d
                    };
                }
            }
        }

        window.addEventListener('resize', initSnow);

        initSnow();

        setInterval(drawSnow, 30);

        // Background fallback
        const bgLayer = document.getElementById('bg-layer');

        const img = new Image();

        img.src = 'bg.png';

        img.onerror = () => {
            bgLayer.style.background = "#020617";
        };
    </script>

</body>
</html>
