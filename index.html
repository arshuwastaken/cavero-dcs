<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavero DC's - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #020617;
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* BACKGROUND FIX */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Relative path use kiya hai aur name exactly wahi jo repo mein hai */
            background: url(bg.png) no-repeat center center/cover;
            z-index: -3;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* reference image jaisa dark look */
            z-index: -1;
        }

        /* Snow Effect */
        #snowCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Sidebar Toggle */
        .menu-icon {
            position: fixed;
            top: 25px;
            left: 25px;
            font-size: 30px;
            cursor: pointer;
            z-index: 10;
        }

        /* Main UI */
        .container {
            text-align: center;
            z-index: 5;
            width: 90%;
            max-width: 600px;
        }

        .logo {
            width: 220px; /* Logo size thoda bada */
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6));
            margin-bottom: 10px;
        }

        .brand-name {
            font-size: 3.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .brand-name span { color: #3b82f6; }

        /* Buttons like Reference Image */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            width: 100%;
            max-width: 350px;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.8);
        }

        /* Top Nav */
        .top-nav {
            position: fixed;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 15px;
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="overlay"></div>
    <canvas id="snowCanvas"></canvas>

    <div class="menu-icon">☰</div>

    <div class="top-nav">
        <div class="nav-item">📄 Terms Of Services</div>
        <div class="nav-item">🔄</div>
    </div>

    <div class="container">
        <img src="./logo.png" alt="" class="logo">
        <h1 class="brand-name">CAVERO <span>DC'S</span></h1>

        <div class="btn-group">
            <a href="#" class="btn">
                <span>🗄️</span> Create A Dc Server
            </a>
            <a href="#" class="btn">
                <span>💬</span> Contact Us
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speed = Math.random() * 1 + 0.5;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
