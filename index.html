<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cavero DC's - Official</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #020617;
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* BACKGROUND SECTION */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url 'bg.png' no-repeat center center/cover;
            z-index: -3;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.7); /* Thoda dark overlay clean look ke liye */
            z-index: -2;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 100;
            top: 0; left: 0;
            background: #0f172a;
            overflow-x: hidden;
            transition: 0.3s ease;
            border-right: 1px solid #1e293b;
            padding-top: 80px;
        }

        .sidebar a {
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.1rem;
            color: #94a3b8;
            display: block;
            transition: 0.2s;
        }

        .sidebar a:hover {
            color: white;
            background: #1e293b;
        }

        /* MENU BUTTON - No Glow */
        .menu-btn {
            position: fixed;
            top: 25px; left: 25px;
            font-size: 24px;
            cursor: pointer;
            z-index: 50;
            color: white;
            opacity: 0.8;
            transition: 0.3s;
        }
        .menu-btn:hover { opacity: 1; }

        /* CONTENT */
        .main-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo {
            width: 120px; /* Thoda chhota aur clean */
            margin-bottom: 25px;
            /* Filter/Glow hata diya gaya hai */
        }

        .brand-title {
            font-size: 3rem;
            letter-spacing: 2px;
            font-weight: 800;
            margin-bottom: 40px;
            color: #f8fafc;
        }

        .brand-title span { color: #3b82f6; }

        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 280px;
        }

        .action-btn {
            padding: 16px;
            border-radius: 6px;
            border: none;
            background: #2563eb;
            color: white;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s ease;
            /* Box shadow/Glow hata diya gaya hai */
        }

        .action-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
        }

        .btn-secondary:hover {
            background: #1e293b;
            border-color: #475569;
            color: white;
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="overlay"></div>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" style="position:absolute; top:20px; right:25px; font-size:30px;" onclick="closeNav()">&times;</a>
        <a href="#">Dashboard</a>
        <a href="#">Services</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
    </div>

    <div class="menu-btn" onclick="openNav()">☰</div>

    <div class="main-content">
        <img src="logo.png" alt="Logo" class="logo">
        <h1 class="brand-title">CAVERO <span>DC'S</span></h1>
        
        <div class="btn-box">
            <a href="#" class="action-btn">CREATE SERVER</a>
            <a href="#" class="action-btn btn-secondary">SUPPORT</a>
        </div>
    </div>

    <script>
        function openNav() { document.getElementById("sidebar").style.width = "260px"; }
        function closeNav() { document.getElementById("sidebar").style.width = "0"; }

        // Background Fallback
        const bgLayer = document.getElementById('bg-layer');
        const img = new Image();
        img.src = 'bg.png';
        img.onerror = () => bgLayer.style.background = "#020617";
    </script>
</body>
</html>
