<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account - Cavero DC's</title>

    <!-- NO CACHE -->
    <meta http-equiv="Cache-Control"
          content="no-cache, no-store, must-revalidate">

    <meta http-equiv="Pragma"
          content="no-cache">

    <meta http-equiv="Expires"
          content="0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,
        body{

            width:100%;
            min-height:100vh;

            background:#020617;

            color:white;

            font-family:'Inter','Segoe UI',sans-serif;

            overflow-x:hidden;

        }

        /* PAGE ANIMATION */

        body{

            animation:fadePage .7s ease;

        }

        @keyframes fadePage{

            from{
                opacity:0;
                transform:scale(1.02);
            }

            to{
                opacity:1;
                transform:scale(1);
            }

        }

        .fade-out{

            opacity:0;
            transform:scale(.98);

            transition:.4s ease;

        }

        /* BACKGROUND */

        #bg-layer{

            position:fixed;
            inset:0;

            background-image:url('bg.png');

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            z-index:0;

        }

        /* OVERLAY */

        .overlay{

            position:fixed;
            inset:0;

            background:rgba(2,6,23,.62);

            z-index:1;

        }

        /* SNOW */

        #snowCanvas{

            position:fixed;
            inset:0;

            width:100%;
            height:100%;

            z-index:2;

            pointer-events:none;

        }

        /* MAIN */

        .main{

            position:relative;
            z-index:5;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:25px;

        }

        /* CARD */

        .card{

            width:100%;
            max-width:540px;

            background:rgba(15,23,42,.72);

            border:1px solid rgba(59,130,246,.22);

            backdrop-filter:blur(16px);

            border-radius:30px;

            padding:45px;

            box-shadow:0 0 40px rgba(37,99,235,.16);

        }

        /* TITLE */

        .title{

            text-align:center;

            font-size:2.7rem;

            font-weight:900;

            letter-spacing:2px;

            margin-bottom:12px;

        }

        .title span{

            color:#3b82f6;

        }

        .subtitle{

            text-align:center;

            color:#94a3b8;

            margin-bottom:35px;

            font-size:1rem;

        }

        /* INPUT */

        .input-box{

            margin-bottom:22px;

        }

        .input-box label{

            display:block;

            margin-bottom:10px;

            font-size:1rem;

            font-weight:700;

            color:#cbd5e1;

        }

        .input-box input{

            width:100%;

            padding:18px;

            border-radius:14px;

            border:1px solid rgba(59,130,246,.18);

            background:rgba(2,6,23,.82);

            color:white;

            font-size:1rem;

            outline:none;

            transition:.3s ease;

        }

        .input-box input:focus{

            border-color:#3b82f6;

            box-shadow:0 0 20px rgba(37,99,235,.18);

        }

        /* BUTTON */

        .create-btn{

            width:100%;

            padding:18px;

            border:none;

            border-radius:14px;

            background:#2563eb;

            color:white;

            font-size:1rem;

            font-weight:800;

            cursor:pointer;

            transition:.3s ease;

            margin-top:8px;

            letter-spacing:1px;

        }

        .create-btn:hover{

            background:#1d4ed8;

            transform:scale(1.02);

        }

        .create-btn:disabled{

            opacity:.7;

            cursor:not-allowed;

        }

        /* MESSAGE */

        .message{

            margin-top:22px;

            text-align:center;

            font-weight:700;

            font-size:.95rem;

            color:#22c55e;

            word-break:break-word;

        }

        .error{

            color:#ef4444;

        }

        /* BACK */

        .back{

            display:block;

            text-align:center;

            margin-top:25px;

            text-decoration:none;

            color:#94a3b8;

            transition:.3s ease;

        }

        .back:hover{

            color:white;

        }

        /* MOBILE */

        @media(max-width:600px){

            .card{

                padding:32px 22px;

            }

            .title{

                font-size:2rem;

            }

        }

    </style>

</head>

<body>

    <!-- BACKGROUND -->

    <div id="bg-layer"></div>

    <div class="overlay"></div>

    <!-- SNOW -->

    <canvas id="snowCanvas"></canvas>

    <!-- MAIN -->

    <div class="main">

        <div class="card">

            <h1 class="title">

                CREATE <span>ACCOUNT</span>

            </h1>

            <p class="subtitle">

                Join Cavero DC's Official Website

            </p>

            <!-- FORM -->

            <form id="registerForm">

                <!-- NAME -->

                <div class="input-box">

                    <label>Create Name</label>

                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your name"
                        maxlength="25"
                        autocomplete="off"
                        required
                    >

                </div>

                <!-- EMAIL -->

                <div class="input-box">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter email"
                        autocomplete="off"
                        required
                    >

                </div>

                <!-- PASSWORD -->

                <div class="input-box">

                    <label>Password</label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Minimum 6 characters"
                        minlength="6"
                        required
                    >

                </div>

                <!-- BUTTON -->

                <button
                    type="submit"
                    class="create-btn"
                    id="createBtn">

                    CREATE ACCOUNT

                </button>

            </form>

            <!-- MESSAGE -->

            <div id="message"
                 class="message">

            </div>

            <!-- BACK -->

            <a href="index.html"
               class="back"
               onclick="smoothPage(event,this.href)">

               ← Go Back Home

            </a>

        </div>

    </div>

    <!-- FIREBASE -->

    <script type="module">

        import {
            initializeApp
        }

        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import {

            getAuth,

            createUserWithEmailAndPassword,

            updateProfile,

            sendEmailVerification

        }

        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        /* FIREBASE CONFIG */

        const firebaseConfig = {

            apiKey:
            "AIzaSyAmC4fe50RFG62d3k10tIrlYfNT3iWF94Y",

            authDomain:
            "cavero-dcs.firebaseapp.com",

            projectId:
            "cavero-dcs",

            storageBucket:
            "cavero-dcs.firebasestorage.app",

            messagingSenderId:
            "631632094928",

            appId:
            "1:631632094928:web:cbb62c92117f05a08960d5",

            measurementId:
            "G-R39B13Q1V8"

        };

        /* INIT */

        const app =
        initializeApp(firebaseConfig);

        const auth =
        getAuth(app);

        /* ELEMENTS */

        const form =
        document.getElementById("registerForm");

        const message =
        document.getElementById("message");

        const createBtn =
        document.getElementById("createBtn");

        /* FORM */

        form.addEventListener(
            "submit",
            async (e)=>{

            e.preventDefault();

            const name =
            document.getElementById("name")
            .value
            .trim();

            const email =
            document.getElementById("email")
            .value
            .trim();

            const password =
            document.getElementById("password")
            .value;

            /* RESET */

            message.innerText = "";

            message.classList.remove("error");

            /* VALIDATION */

            if(name.length < 3){

                message.classList.add("error");

                message.innerText =
                "Name must be at least 3 characters.";

                return;

            }

            if(password.length < 6){

                message.classList.add("error");

                message.innerText =
                "Password must be at least 6 characters.";

                return;

            }

            try{

                createBtn.disabled = true;

                createBtn.innerText =
                "CREATING ACCOUNT...";

                /* CREATE ACCOUNT */

                const userCredential =
                await createUserWithEmailAndPassword(

                    auth,
                    email,
                    password

                );

                /* SAVE DISPLAY NAME */

                await updateProfile(

                    userCredential.user,

                    {
                        displayName:name
                    }

                );

                /* EMAIL VERIFY */

                await sendEmailVerification(
                    userCredential.user
                );

                message.innerText =
                "Account Created Successfully! Verification Email Sent.";

                /* REDIRECT */

                setTimeout(()=>{

                    window.location.href =
                    "login.html";

                },2500);

            }

            catch(error){

                message.classList.add("error");

                if(
                    error.code ===
                    "auth/email-already-in-use"
                ){

                    message.innerText =
                    "Email already exists.";

                }

                else if(
                    error.code ===
                    "auth/invalid-email"
                ){

                    message.innerText =
                    "Invalid email format.";

                }

                else if(
                    error.code ===
                    "auth/weak-password"
                ){

                    message.innerText =
                    "Password is too weak.";

                }

                else{

                    message.innerText =
                    "Failed to create account.";

                }

            }

            finally{

                createBtn.disabled = false;

                createBtn.innerText =
                "CREATE ACCOUNT";

            }

        });

    </script>

    <!-- PAGE TRANSITION -->

    <script>

        function smoothPage(e,link){

            e.preventDefault();

            document.body
            .classList
            .add("fade-out");

            setTimeout(()=>{

                window.location.href = link;

            },400);

        }

    </script>

    <!-- SNOW EFFECT -->

    <script>

        const canvas =
        document.getElementById('snowCanvas');

        const ctx =
        canvas.getContext('2d');

        let flakes = [];

        function initSnow(){

            canvas.width =
            window.innerWidth;

            canvas.height =
            window.innerHeight;

            flakes = [];

            for(let i=0;i<180;i++){

                flakes.push({

                    x:Math.random()*canvas.width,

                    y:Math.random()*canvas.height,

                    r:Math.random()*3+1,

                    d:Math.random()*1+.5

                });

            }

        }

        function drawSnow(){

            ctx.clearRect(
                0,
                0,
                canvas.width,
                canvas.height
            );

            ctx.fillStyle =
            "rgba(255,255,255,.9)";

            ctx.beginPath();

            for(let i=0;i<flakes.length;i++){

                let f = flakes[i];

                ctx.moveTo(f.x,f.y);

                ctx.arc(

                    f.x,
                    f.y,
                    f.r,
                    0,
                    Math.PI*2,
                    true

                );

            }

            ctx.fill();

            moveSnow();

        }

        function moveSnow(){

            for(let i=0;i<flakes.length;i++){

                let f = flakes[i];

                f.y += f.d;

                f.x += Math.sin(f.y*.01);

                if(f.y > canvas.height){

                    flakes[i] = {

                        x:Math.random()*canvas.width,

                        y:-10,

                        r:f.r,

                        d:f.d

                    };

                }

            }

        }

        window.addEventListener(
            'resize',
            initSnow
        );

        initSnow();

        setInterval(drawSnow,30);

    </script>

</body>
</html>
