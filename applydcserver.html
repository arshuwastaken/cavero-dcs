<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apply DC Server - Cavero DC's</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,
        body{
            width:100%;
            min-height:100vh;
            color:white;
            font-family:'Inter','Segoe UI',sans-serif;
            overflow-x:hidden;

            background:
                linear-gradient(rgba(2,6,23,.45), rgba(2,6,23,.45)),
                url('./bg.png?v=10');

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            background-attachment:fixed;

            background-color:#020617;
        }

        body{
            animation:fadePage .7s ease;
        }

        @keyframes fadePage{
            from{
                opacity:0;
                transform:scale(1.02);
            }

            to{
                opacity:1;
                transform:scale(1);
            }
        }

        .fade-out{
            opacity:0;
            transform:scale(.98);
            transition:.4s ease;
        }

        #snowCanvas{
            position:fixed;
            inset:0;
            width:100%;
            height:100%;
            pointer-events:none;
            z-index:1;
        }

        .header{
            position:relative;
            z-index:2;
            padding:45px 20px;
            text-align:center;
        }

        .header h1{
            font-size:3rem;
            font-weight:900;
            letter-spacing:2px;
            text-shadow:0 0 25px rgba(37,99,235,.35);
        }

        .header h1 span{
            color:#3b82f6;
        }

        .plans-container{
            position:relative;
            z-index:2;
            max-width:1200px;
            margin:auto;
            padding:40px 20px;
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:30px;
        }

        .plan-box{
            width:320px;
            padding:40px 30px;
            border-radius:24px;
            background:rgba(15,23,42,.62);
            border:1px solid rgba(59,130,246,.18);
            backdrop-filter:blur(14px);
            text-align:center;
            transition:.35s ease;
            box-shadow:0 0 25px rgba(37,99,235,.08);
            position:relative;
            overflow:hidden;
        }

        .plan-box:hover{
            transform:translateY(-10px);
            border-color:#3b82f6;
            background:rgba(15,23,42,.84);
            box-shadow:0 0 35px rgba(37,99,235,.22);
        }

        .plan-name{
            font-size:1.9rem;
            font-weight:800;
            margin-bottom:15px;
        }

        .plan-price{
            font-size:2.7rem;
            font-weight:900;
            color:#3b82f6;
            margin-bottom:25px;
            text-shadow:0 0 20px rgba(37,99,235,.35);
        }

        .plan-price span{
            font-size:1rem;
            color:#94a3b8;
        }

        .checkout-btn{
            display:block;
            width:100%;
            padding:16px;
            border-radius:14px;
            text-decoration:none;
            background:#2563eb;
            color:white;
            font-size:1rem;
            font-weight:800;
            letter-spacing:1px;
            transition:.3s ease;
            box-shadow:0 0 20px rgba(37,99,235,.18);
        }

        .checkout-btn:hover{
            background:#1d4ed8;
            transform:scale(1.03);
            box-shadow:0 0 30px rgba(37,99,235,.35);
        }

        .back-link{
            position:relative;
            z-index:2;
            display:block;
            text-align:center;
            margin-top:40px;
            padding-bottom:50px;
            text-decoration:none;
            color:#94a3b8;
            transition:.3s ease;
        }

        .back-link:hover{
            color:white;
        }

        @media(max-width:700px){

            .header h1{
                font-size:2.2rem;
            }

            .plan-box{
                width:95%;
            }

        }

    </style>
</head>
<body>

    <canvas id="snowCanvas"></canvas>

    <div class="header">
        <h1>
            SELECT YOUR <span>PLAN</span>
        </h1>
    </div>

    <div class="plans-container">

        <div class="plan-box">
            <h2 class="plan-name">Base Plan</h2>

            <div class="plan-price">
                ₹70<span>/One Time</span>
            </div>

            <a href="checkout.html?plan=BasePlan"
               class="checkout-btn"
               onclick="smoothPage(event,this.href)">
                CHECKOUT PLAN
            </a>
        </div>

        <div class="plan-box">
            <h2 class="plan-name">Astroid Plan</h2>

            <div class="plan-price">
                ₹85<span>/One Time</span>
            </div>

            <a href="checkout.html?plan=AstroidPlan"
               class="checkout-btn"
               onclick="smoothPage(event,this.href)">
                CHECKOUT PLAN
            </a>
        </div>

        <div class="plan-box">
            <h2 class="plan-name">Meteoride Plan</h2>

            <div class="plan-price">
                ₹110<span>/One Time</span>
            </div>

            <a href="checkout.html?plan=MeteoridePlan"
               class="checkout-btn"
               onclick="smoothPage(event,this.href)">
                CHECKOUT PLAN
            </a>
        </div>

    </div>

    <a href="index.html"
       class="back-link"
       onclick="smoothPage(event,this.href)">
        ← Go Back Home
    </a>

    <script>

        function smoothPage(e, link){
            e.preventDefault();
            document.body.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = link;
            }, 400);
        }

        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        let flakes = [];

        function initSnow(){

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            flakes = [];

            for(let i = 0; i < 180; i++){

                flakes.push({
                    x:Math.random() * canvas.width,
                    y:Math.random() * canvas.height,
                    r:Math.random() * 3 + 1,
                    d:Math.random() * 1 + .5
                });

            }

        }

        function drawSnow(){

            ctx.clearRect(0,0,canvas.width,canvas.height);

            ctx.fillStyle = "rgba(255,255,255,.9)";
            ctx.beginPath();

            for(let i = 0; i < flakes.length; i++){

                let f = flakes[i];

                ctx.moveTo(f.x,f.y);

                ctx.arc(f.x,f.y,f.r,0,Math.PI * 2,true);

            }

            ctx.fill();

            moveSnow();

        }

        function moveSnow(){

            for(let i = 0; i < flakes.length; i++){

                let f = flakes[i];

                f.y += f.d;
                f.x += Math.sin(f.y * .01);

                if(f.y > canvas.height){

                    flakes[i] = {
                        x:Math.random() * canvas.width,
                        y:-10,
                        r:f.r,
                        d:f.d
                    };

                }

            }

        }

        window.addEventListener('resize', initSnow);

        initSnow();

        setInterval(drawSnow,30);

    </script>

</body>
</html>
