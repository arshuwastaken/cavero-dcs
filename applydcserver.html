<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply DC Server - Cavero DC's</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%;
            min-height: 100vh;
            background-color: #020617;
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* BACKGROUND & OVERLAY */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg.png') no-repeat center center/cover;
            z-index: -3;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.8);
            z-index: -2;
        }

        #snowCanvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* HEADER */
        .header {
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .header h1 span { color: #3b82f6; }

        /* PLANS CONTAINER */
        .plans-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* PLAN BOX */
        .plan-box {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            width: 320px;
            padding: 40px 30px;
            border-radius: 20px; /* Curved Edges */
            text-align: center;
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .plan-box:hover {
            border-color: #3b82f6;
            transform: translateY(-10px);
            background: rgba(15, 23, 42, 0.8);
        }

        .plan-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #f8fafc;
        }

        .plan-price {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 25px;
            color: #3b82f6;
        }

        .plan-price span {
            font-size: 1.2rem;
            color: #94a3b8;
        }

        /* CHECKOUT BUTTON */
        .checkout-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
            margin-top: 20px;
        }

        .checkout-btn:hover {
            background: #1d4ed8;
        }

        .back-link {
            display: block;
            text-align: center;
            color: #94a3b8;
            text-decoration: none;
            margin-top: 40px;
            font-size: 1rem;
            padding-bottom: 50px;
        }

        .back-link:hover { color: white; }

    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div class="overlay"></div>
    <canvas id="snowCanvas"></canvas>

    <div class="header">
        <h1>SELECT YOUR <span>PLAN</span></h1>
    </div>

    <div class="plans-container">
        <div class="plan-box">
            <div>
                <h2 class="plan-name">Base Plan</h2>
                <div class="plan-price">₹65<span>/mo</span></div>
            </div>
            <a href="#" class="checkout-btn">CHECKOUT PLAN</a>
        </div>

        <div class="plan-box">
            <div>
                <h2 class="plan-name">Astroid Plan</h2>
                <div class="plan-price">₹85<span>/mo</span></div>
            </div>
            <a href="#" class="checkout-btn">CHECKOUT PLAN</a>
        </div>

        <div class="plan-box">
            <div>
                <h2 class="plan-name">Meteoride Plan</h2>
                <div class="plan-price">₹110<span>/mo</span></div>
            </div>
            <a href="#" class="checkout-btn">CHECKOUT PLAN</a>
        </div>
    </div>

    <a href="index.html" class="back-link">← Go Back Home</a>

    <script>
        // Snow Logic
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        let flakes = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            flakes = [];
            for(let i=0; i<100; i++) {
                flakes.push({ 
                    x: Math.random()*canvas.width, 
                    y: Math.random()*canvas.height, 
                    r: Math.random()*2+1, 
                    s: Math.random()*1+0.5 
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.beginPath();
            flakes.forEach(f => {
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            });
            ctx.fill();
            move();
        }

        function move() {
            flakes.forEach(f => {
                f.y += f.s;
                if(f.y > canvas.height) f.y = -5;
            });
        }

        window.addEventListener('resize', init);
        init();
        setInterval(draw, 30);

        // BG Fallback
        const bgLayer = document.getElementById('bg-layer');
        const img = new Image();
        img.src = 'bg.png';
        img.onerror = () => bgLayer.style.background = "#020617";
    </script>
</body>
</html>
