<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>ALL ORDERS - Cavero DC's</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    font-family:'Inter',sans-serif;

    color:white;

    background:
    linear-gradient(rgba(2,6,23,.65),rgba(2,6,23,.65)),
    url('./bg.png');

    background-size:cover;
    background-position:center;

    overflow-x:hidden;
}

/* SNOW */

#snowCanvas{

    position:fixed;

    inset:0;

    width:100%;
    height:100%;

    z-index:1;

    pointer-events:none;
}

/* MAIN */

.main{

    position:relative;

    z-index:5;

    padding:40px 20px;
}

/* TOP */

.top-bar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:35px;

    gap:20px;

    flex-wrap:wrap;
}

.title{

    font-size:2.5rem;

    font-weight:900;
}

.title span{
    color:#3b82f6;
}

.back-btn{

    padding:14px 22px;

    border-radius:14px;

    background:#2563eb;

    color:white;

    text-decoration:none;

    font-weight:700;

    transition:.3s ease;
}

.back-btn:hover{

    background:#1d4ed8;

    transform:scale(1.03);
}

/* GRID */

.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

    gap:25px;
}

/* CARD */

.card{

    background:rgba(15,23,42,.78);

    backdrop-filter:blur(14px);

    border:1px solid rgba(59,130,246,.2);

    border-radius:24px;

    padding:25px;

    box-shadow:0 0 30px rgba(37,99,235,.12);

    animation:fadeIn .5s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.card h2{

    margin-bottom:18px;

    color:#3b82f6;

    font-size:1.4rem;
}

.info{

    margin-bottom:14px;

    line-height:1.5;

    word-break:break-word;
}

.label{

    color:#93c5fd;

    font-weight:700;
}

.empty{

    text-align:center;

    margin-top:100px;

    color:#94a3b8;

    font-size:1.2rem;
}

/* MOBILE */

@media(max-width:700px){

    .title{
        font-size:2rem;
    }

}

</style>
</head>
<body>

<!-- SNOW -->

<canvas id="snowCanvas"></canvas>

<!-- MAIN -->

<div class="main">

    <!-- TOP -->

    <div class="top-bar">

        <h1 class="title">
            ALL <span>ORDERS</span>
        </h1>

        <a href="index.html"
           class="back-btn">

           ← BACK

        </a>

    </div>

    <!-- DATA -->

    <div class="grid"
         id="dataContainer">

    </div>

    <!-- EMPTY -->

    <div class="empty"
         id="emptyMsg">

         Loading enquiries...

    </div>

</div>

<!-- FIREBASE -->

<script type="module">

import {

    initializeApp

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

    getAuth,

    onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

    getFirestore,

    collection,

    getDocs,

    query

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

    apiKey:
    "AIzaSyAmC4fe50RFG62d3k10tIrlYfNT3iWF94Y",

    authDomain:
    "cavero-dcs.firebaseapp.com",

    projectId:
    "cavero-dcs",

    storageBucket:
    "cavero-dcs.firebasestorage.app",

    messagingSenderId:
    "631632094928",

    appId:
    "1:631632094928:web:cbb62c92117f05a08960d5",

    measurementId:
    "G-R39B13Q1V8"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

/* ADMIN EMAILS */

const adminEmails = [

    "arshshuklabpl@gmail.com"

];

/* ELEMENTS */

const dataContainer =
document.getElementById("dataContainer");

const emptyMsg =
document.getElementById("emptyMsg");

/* SECURITY */

onAuthStateChanged(auth,async(user)=>{

    if(!user){

        window.location.href =
        "login.html";

        return;
    }

    if(
        !adminEmails.includes(
            user.email
        )
    ){

        document.body.innerHTML = `

        <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:2rem;
        font-weight:800;
        color:#ef4444;
        text-align:center;
        padding:20px;
        ">

        ACCESS DENIED

        </div>

        `;

        return;
    }

    loadEnquiries();

});

/* LOAD DATA */

async function loadEnquiries(){

    try{

        const q =
        query(

            collection(
                db,
                "checkout_enquiries"
            )

        );

        const querySnapshot =
        await getDocs(q);

        dataContainer.innerHTML = "";

        if(querySnapshot.empty){

            emptyMsg.innerText =
            "No enquiries found.";

            return;
        }

        emptyMsg.style.display =
        "none";

        querySnapshot.forEach((doc)=>{

            const data = doc.data();

            const card =
            document.createElement("div");

            card.className =
            "card";

            card.innerHTML = `

            <h2>
                ${data.selectedPlan || "Unknown Plan"}
            </h2>

            <div class="info">

                <span class="label">
                    Discord:
                </span>

                ${data.discordUsername || "N/A"}

            </div>

            <div class="info">

                <span class="label">
                    Email:
                </span>

                ${data.email || "N/A"}

            </div>

            <div class="info">

                <span class="label">
                    Server:
                </span>

                ${data.serverName || "N/A"}

            </div>

            <div class="info">

                <span class="label">
                    Description:
                </span>

                ${data.serverDescription || "N/A"}

            </div>

            <div class="info">

                <span class="label">
                    Admin Access:
                </span>

                ${data.adminAccess || "N/A"}

            </div>

            <div class="info">

                <span class="label">
                    IP Address:
                </span>

                ${data.ipAddress || "Unknown"}

            </div>

            `;

            dataContainer.appendChild(card);

        });

    }

    catch(err){

        emptyMsg.innerText =
        "Failed to load enquiries.";

        console.error(err);

    }

}

</script>

<!-- SNOW EFFECT -->

<script>

const canvas =
document.getElementById('snowCanvas');

const ctx =
canvas.getContext('2d');

let flakes = [];

function initSnow(){

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;

    flakes = [];

    for(let i=0;i<180;i++){

        flakes.push({

            x:Math.random()*canvas.width,

            y:Math.random()*canvas.height,

            r:Math.random()*3+1,

            d:Math.random()*1+.5

        });

    }

}

function drawSnow(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle =
    "rgba(255,255,255,.9)";

    ctx.beginPath();

    for(let i=0;i<flakes.length;i++){

        let f = flakes[i];

        ctx.moveTo(f.x,f.y);

        ctx.arc(

            f.x,
            f.y,
            f.r,
            0,
            Math.PI*2,
            true

        );

    }

    ctx.fill();

    moveSnow();

}

function moveSnow(){

    for(let i=0;i<flakes.length;i++){

        let f = flakes[i];

        f.y += f.d;

        f.x += Math.sin(f.y*.01);

        if(f.y > canvas.height){

            flakes[i] = {

                x:Math.random()*canvas.width,

                y:-10,

                r:f.r,

                d:f.d

            };

        }

    }

}

window.addEventListener(
'resize',
initSnow
);

initSnow();

setInterval(drawSnow,30);

</script>

</body>
</html>
