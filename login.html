<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - Cavero DC's</title>

    <!-- NO CACHE -->

    <meta http-equiv="Cache-Control"
          content="no-cache, no-store, must-revalidate">

    <meta http-equiv="Pragma"
          content="no-cache">

    <meta http-equiv="Expires"
          content="0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,
        body{

            width:100%;
            min-height:100vh;

            background:#020617;

            color:white;

            font-family:'Inter','Segoe UI',sans-serif;

            overflow-x:hidden;

        }

        body{

            animation:fadePage .7s ease;

        }

        @keyframes fadePage{

            from{
                opacity:0;
                transform:scale(1.02);
            }

            to{
                opacity:1;
                transform:scale(1);
            }

        }

        .fade-out{

            opacity:0;

            transform:scale(.98);

            transition:.4s ease;

        }

        #bg-layer{

            position:fixed;

            inset:0;

            background-image:url('bg.png');

            background-size:cover;

            background-position:center;

            background-repeat:no-repeat;

            z-index:0;

        }

        .overlay{

            position:fixed;

            inset:0;

            background:rgba(2,6,23,.62);

            z-index:1;

        }

        #snowCanvas{

            position:fixed;

            inset:0;

            width:100%;
            height:100%;

            z-index:2;

            pointer-events:none;

        }

        .main{

            position:relative;

            z-index:5;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:25px;

        }

        .card{

            width:100%;
            max-width:520px;

            background:rgba(15,23,42,.72);

            border:1px solid rgba(59,130,246,.22);

            backdrop-filter:blur(16px);

            border-radius:30px;

            padding:45px;

            box-shadow:0 0 40px rgba(37,99,235,.16);

        }

        .title{

            text-align:center;

            font-size:2.6rem;

            font-weight:900;

            letter-spacing:2px;

            margin-bottom:12px;

        }

        .title span{

            color:#3b82f6;

        }

        .subtitle{

            text-align:center;

            color:#94a3b8;

            margin-bottom:35px;

            font-size:1rem;

        }

        .input-box{

            margin-bottom:22px;

        }

        .input-box label{

            display:block;

            margin-bottom:10px;

            font-size:1rem;

            font-weight:700;

            color:#cbd5e1;

        }

        .input-box input{

            width:100%;

            padding:18px;

            border-radius:14px;

            border:1px solid rgba(59,130,246,.18);

            background:rgba(2,6,23,.82);

            color:white;

            font-size:1rem;

            outline:none;

            transition:.3s ease;

        }

        .input-box input:focus{

            border-color:#3b82f6;

            box-shadow:0 0 20px rgba(37,99,235,.18);

        }

        .login-btn{

            width:100%;

            padding:18px;

            border:none;

            border-radius:14px;

            background:#2563eb;

            color:white;

            font-size:1rem;

            font-weight:800;

            cursor:pointer;

            transition:.3s ease;

            margin-top:8px;

            letter-spacing:1px;

        }

        .login-btn:hover{

            background:#1d4ed8;

            transform:scale(1.02);

        }

        .login-btn:disabled{

            opacity:.7;

            cursor:not-allowed;

        }

        .message{

            margin-top:22px;

            text-align:center;

            font-weight:700;

            font-size:.95rem;

            color:#22c55e;

            word-break:break-word;

        }

        .error{

            color:#ef4444;

        }

        .back{

            display:block;

            text-align:center;

            margin-top:25px;

            text-decoration:none;

            color:#94a3b8;

            transition:.3s ease;

        }

        .back:hover{

            color:white;

        }

        @media(max-width:600px){

            .card{
                padding:32px 22px;
            }

            .title{
                font-size:2rem;
            }

        }

    </style>

</head>

<body>

    <div id="bg-layer"></div>
    <div class="overlay"></div>
    <canvas id="snowCanvas"></canvas>

    <div class="main">

        <div class="card">

            <h1 class="title">LOGIN <span>ACCOUNT</span></h1>

            <p class="subtitle">Login To Continue Into Cavero DC's</p>

            <form id="loginForm">

                <div class="input-box">

                    <label>Email</label>

                    <input type="email" id="email" placeholder="Enter your email" autocomplete="off" required>

                </div>

                <div class="input-box">

                    <label>Password</label>

                    <input type="password" id="password" placeholder="Enter your password" required>

                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    LOGIN ACCOUNT
                </button>

            </form>

            <div id="message" class="message"></div>

            <a href="index.html" class="back" onclick="smoothPage(event,this.href)">
                ← Go Back Home
            </a>

        </div>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmC4fe50RFG62d3k10tIrlYfNT3iWF94Y",
            authDomain: "cavero-dcs.firebaseapp.com",
            projectId: "cavero-dcs",
            storageBucket: "cavero-dcs.firebasestorage.app",
            messagingSenderId: "631632094928",
            appId: "1:631632094928:web:cbb62c92117f05a08960d5",
            measurementId: "G-R39B13Q1V8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById("loginForm");
        const message = document.getElementById("message");
        const loginBtn = document.getElementById("loginBtn");

        form.addEventListener("submit", async (e)=>{

            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            message.innerText = "";
            message.classList.remove("error");

            try{

                loginBtn.disabled = true;
                loginBtn.innerText = "VERIFYING ACCOUNT...";

                await setPersistence(auth, browserLocalPersistence);

                const userCredential = await signInWithEmailAndPassword(auth, email, password);

                if(!userCredential.user.emailVerified){

                    message.classList.add("error");
                    message.innerText = "Please verify your email first.";
                    return;

                }

                localStorage.setItem("caveroLoggedIn", "true");
                localStorage.setItem("caveroUserEmail", userCredential.user.email);
                localStorage.setItem("caveroDisplayName", userCredential.user.displayName || "User");

                message.innerText = "Login Successful! Redirecting...";

                setTimeout(()=>{

                    // ✅ CHANGED HERE ONLY
                    window.location.href = "index.html";

                },2000);

            }

            catch(error){

                message.classList.add("error");

                if(error.code === "auth/user-not-found"){
                    message.innerText = "No account found.";
                }
                else if(error.code === "auth/wrong-password"){
                    message.innerText = "Incorrect password.";
                }
                else if(error.code === "auth/invalid-credential"){
                    message.innerText = "Invalid email or password.";
                }
                else{
                    message.innerText = "Login failed.";
                }

            }

            finally{

                loginBtn.disabled = false;
                loginBtn.innerText = "LOGIN ACCOUNT";

            }

        });

        document.addEventListener("contextmenu",(e)=>e.preventDefault());

        document.addEventListener("keydown",function(e){

            if(
                e.key === "F12" ||
                (e.ctrlKey && e.shiftKey && e.key === "I") ||
                (e.ctrlKey && e.shiftKey && e.key === "J") ||
                (e.ctrlKey && e.key === "U")
            ){
                e.preventDefault();
            }

        });

    </script>

    <script>

        function smoothPage(e,link){

            e.preventDefault();

            document.body.classList.add("fade-out");

            setTimeout(()=>{

                window.location.href = link;

            },400);

        }

    </script>

    <script>

        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');

        let flakes = [];

        function initSnow(){

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            flakes = [];

            for(let i=0;i<180;i++){

                flakes.push({

                    x:Math.random()*canvas.width,
                    y:Math.random()*canvas.height,
                    r:Math.random()*3+1,
                    d:Math.random()*1+.5

                });

            }

        }

        function drawSnow(){

            ctx.clearRect(0,0,canvas.width,canvas.height);

            ctx.fillStyle = "rgba(255,255,255,.9)";
            ctx.beginPath();

            for(let f of flakes){

                ctx.moveTo(f.x,f.y);
                ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true);

            }

            ctx.fill();

            for(let f of flakes){

                f.y += f.d;
                f.x += Math.sin(f.y*.01);

                if(f.y > canvas.height){

                    f.y = -10;
                    f.x = Math.random()*canvas.width;

                }

            }

        }

        window.addEventListener('resize',initSnow);

        initSnow();
        setInterval(drawSnow,30);

    </script>

</body>
</html>
